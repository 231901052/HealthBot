<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASHA Dashboard</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 0;
    }

    .header {
        background: #d9534f;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
    }

    .container {
        max-width: 900px;
        margin: 20px auto;
        padding: 10px;
    }

    .alert-card {
        background: #fff;
        border-left: 6px solid #d9534f;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .badge {
        display: inline-block;
        padding: 4px 10px;
        background: #d9534f;
        color: white;
        border-radius: 20px;
        font-size: 12px;
        margin-bottom: 8px;
    }

    .row {
        margin: 5px 0;
    }

    .label {
        font-weight: bold;
    }

    .actions {
        margin-top: 10px;
    }

    .btn {
        text-decoration: none;
        padding: 8px 12px;
        margin-right: 8px;
        border-radius: 5px;
        color: white;
        font-size: 14px;
    }

    .call {
        background: #28a745;
    }

    .map {
        background: #007bff;
    }

    .time {
        font-size: 12px;
        color: #666;
    }

    .no-alert {
        text-align: center;
        margin-top: 50px;
        color: #777;
    }
</style>
</head>

<body>

<div class="header">
    🚨 ASHA Emergency Dashboard
</div>

<div class="container">

{% if alerts %}
    {% for alert in alerts %}
        <div class="alert-card">

            <div class="badge">CRITICAL</div>

            <div class="row">
                <span class="label">📞 Phone:</span> {{ alert.phone }}
            </div>

            <div class="row">
                <span class="label">💬 Message:</span> {{ alert.message }}
            </div>

            <div class="row">
                <span class="label">📍 Location:</span>
                <a href="{{ alert.location }}" target="_blank">Open Map</a>
            </div>

            <div class="row time">
                ⏱ {{ alert.timestamp }}
            </div>

            <div class="actions">
                <a href="tel:{{ alert.phone }}" class="btn call">Call</a>
                <a href="{{ alert.location }}" target="_blank" class="btn map">View Map</a>
            </div>

        </div>
    {% endfor %}
{% else %}
    <div class="no-alert">
        ✅ No critical alerts at this time
    </div>
{% endif %}

</div>

</body>
</html>
